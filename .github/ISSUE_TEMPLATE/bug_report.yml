name: Bug Report
description: Report a bug or issue
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug! Please fill out the form below."
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: "What happened?"
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: "1. Do this...\n2. Then this...\n3. See error"
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "Expected result..."
    validations:
      required: true
  
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, etc.
      placeholder: "Python 3.x, OS, etc."
    validations:
      required: false
