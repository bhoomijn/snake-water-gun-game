name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: "Thank you for suggesting a feature! Please fill out the form below."
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the feature
      placeholder: "What feature would you like?"
    validations:
      required: true
  
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this feature?
      placeholder: "This would help because..."
    validations:
      required: true
